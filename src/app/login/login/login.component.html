<div class="login-container">
  <div class="login-banner">
    <img src="img/ranger.png" alt="Ford Ranger" class="banner-image" />
  </div>

  <div class="login-form-side">
    <div class="login-content">
      
      <div class="logo">
        <img src="img/ford.png" alt="Ford" />
      </div>
      
      <h2 class="welcome-title">Boas-vindas</h2>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="form-container">
        
        <div class="input-container focused">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="email"
            name="email"
            [(ngModel)]="usuario.nome"
            required
            placeholder="Insira seu e-mail"
          />
          <span class="info-icon">ⓘ</span>
        </div>

        <div class="input-container">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="senha"
            name="senha"
            [(ngModel)]="usuario.senha"
            required
            placeholder="Insira sua senha"
          />
          <span class="toggle-password">👁️</span>
        </div>

        <div class="form-options">
          <span class="switch-text">Logar automaticamente</span>
          <label class="switch">
            <input type="checkbox" />
            <span class="slider round"></span>
          </label>
          <span class="info-icon-switch">ⓘ</span>
        </div>

        <div class="form-actions">
          <button type="submit" [disabled]="loginForm.invalid || carregando">
            {{ carregando ? 'Entrando...' : 'Enter' }}
          </button>
        </div>
      </form>

      <div *ngIf="erro" class="erro-mensagem">
        {{ erro }}
      </div>
    </div>
  </div>
</div>
